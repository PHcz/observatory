# Phase 3 Mosquitto ACL — installed to /etc/mosquitto/acl by bootstrap-pi.sh.
# Two users: one publisher (Enviro node) and one subscriber (FastAPI service).

# Enviro node — write-only to its own topic.
user enviro-observatory-weather
topic write enviro/observatory-weather

# FastAPI subscriber — read-only across enviro/# wildcard.
user obs-api-subscriber
topic read enviro/#
