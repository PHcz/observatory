# Phase 3 hardened Mosquitto config for observatory.
# Installed to /etc/mosquitto/conf.d/observatory.conf by bootstrap-pi.sh.
# bootstrap-pi.sh renders ${LAN_IP} from `resolve_lan_ip()` (Phase 6 helper).

# Bind to LAN interface only (SEC-03). DO NOT change to 0.0.0.0 in production.
listener 1883 ${LAN_IP}

# Auth (SEC-03)
allow_anonymous false
password_file /etc/mosquitto/passwords
acl_file /etc/mosquitto/acl

# Persistence (best-effort; firmware upload cache is the real durability layer)
persistence true
persistence_location /var/lib/mosquitto/
autosave_interval 60

# QoS 1 in-flight cap — small for the single-node case
max_inflight_messages 20
max_queued_messages 1000

# Logging to journald via syslog (matches OPS-03)
log_dest syslog
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
