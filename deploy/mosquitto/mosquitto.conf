# Phase 1 baseline mosquitto config.
# Phase 3 (Weather Node) replaces this with one that adds the Enviro client user + ACLs.

# Listen on default port 1883 — LAN restriction comes from the host firewall.
listener 1883

# No anonymous access; require password authentication.
allow_anonymous false
password_file /etc/mosquitto/passwords

# QoS 1 persistence (required by Phase 3 weather node).
persistence true
persistence_location /var/lib/mosquitto/

# Logging to syslog (which on the Pi is journald).
log_dest syslog
log_type error
log_type warning
log_type notice
log_type information
