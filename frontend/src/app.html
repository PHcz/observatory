<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="color-scheme" content="light dark" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function () {
				try {
					var raw = localStorage.getItem('observatory.settings.v1');
					var theme = 'auto';
					if (raw) {
						var parsed = JSON.parse(raw);
						if (parsed && (parsed.theme === 'light' || parsed.theme === 'dark' || parsed.theme === 'auto')) {
							theme = parsed.theme;
						}
					}
					var resolved = theme;
					if (theme === 'auto') {
						resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					}
					document.documentElement.dataset.theme = resolved;
				} catch (e) {
					document.documentElement.dataset.theme = 'light';
				}
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
		<title>Observatory — Dashboard</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">%sveltekit.body%</body>
</html>
