# Phase 1 pre-commit configuration.
# Fast hooks run on every `git commit`.
# Slow hooks (mypy strict, bandit, pip-audit, pytest --collect-only) run only on `git push`.
#
# Install:  pre-commit install && pre-commit install --hook-type pre-push
# Run:      pre-commit run --all-files
# Update:   pre-commit autoupdate

default_install_hook_types: [pre-commit, pre-push]

repos:
  # --- Fast hooks: every commit (must be < 2s total) ---

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
        exclude: ^tests/fixtures/
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: ^tests/fixtures/
      - id: check-yaml
        stages: [pre-commit]
        # ESPHome node configs use custom YAML tags (!secret, !include) that a
        # generic YAML parser can't resolve — exclude the firmware configs.
        exclude: ^firmware/
      - id: check-toml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks (secret scanner)
        entry: gitleaks protect --staged --redact --config .gitleaks.toml
        language: system
        stages: [pre-commit]
        pass_filenames: false

  # --- Slow hooks: pre-push only (up to ~30s OK) ---

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        stages: [pre-push]
        args: [--strict, observatory/]
        pass_filenames: false
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - structlog
          - types-PyYAML
          - httpx
          - defusedxml
          - fastapi
          - aiomqtt
          - uvicorn
          - websockets
          # analysis stack — observatory.muon.analysis_adapter imports picomuon
          # (Phase 13), which mypy follows into; picomuon needs these to resolve.
          - numpy
          - polars
          - scipy

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        stages: [pre-push]
        args: [-r, observatory/, -c, pyproject.toml]
        pass_filenames: false
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/pypa/pip-audit
    rev: v2.8.0
    hooks:
      - id: pip-audit
        stages: [pre-push]
        # pip-audit audits its own isolated env; pin its transitive msgpack
        # (via cachecontrol) to the fixed version so the TOOL's deps don't trip
        # the gate — GHSA-6v7p-g79w-8964 (msgpack <1.2.1), not an app dependency.
        additional_dependencies: ["msgpack>=1.2.1"]

  - repo: local
    hooks:
      # Required sensitive-data gate — runs on EVERY commit. Blocks personal
      # email in authorship, secret/credential files, GPS-tagged images, and any
      # content matching the local (gitignored) .git-sensitive-patterns list.
      - id: sensitive-data-gate
        name: sensitive-data gate (PII / GPS / secret files)
        entry: scripts/check-sensitive.sh
        language: script
        stages: [pre-commit]
        always_run: true
        pass_filenames: true
      - id: pytest-collect
        name: pytest --collect-only (import check)
        entry: uv run pytest --collect-only -q
        language: system
        stages: [pre-push]
        pass_filenames: false
